name: Android CI

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Parse update.json details
      id: parse_update
      run: |
        VERSION=$(jq -r '.latestVersion' app/src/main/assets/update.json)
        NOTES=$(jq -r '.releaseNotes | join("\n")' app/src/main/assets/update.json)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "$NOTES" > release_notes.md

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: hK3475-debug-apk
        path: app/build/outputs/apk/debug/*.apk

    - name: Create GitHub Release
      if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.parse_update.outputs.version }}
        name: Version ${{ steps.parse_update.outputs.version }}
        body_path: release_notes.md
        files: app/build/outputs/apk/debug/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
